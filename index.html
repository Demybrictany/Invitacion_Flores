<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invitación Melanie Kristel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Great+Vibes&family=Playfair+Display:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="inicio.css" />
    <link rel="stylesheet" href="css/butterflies.css" />
  </head>
  <body>
    <main class="cover" aria-label="Portada de invitación">
      <section class="cover-card">
        <p class="cover-overline">Mis quince años</p>
        <h1>Melanie Kristel</h1>
        <div class="butterfly-decor butterfly-decor-cover" aria-hidden="true">
          <span class="decor-butterfly decor-butterfly-left">
            <img src="mariposa-alas-abiertas.png" alt="" />
            <img src="mariposa-alas-semicerradas.png" alt="" />
            <img src="mariposa-alas-cerradas.png" alt="" />
          </span>
          <span class="decor-butterfly decor-butterfly-center">
            <img src="mariposa-alas-abiertas.png" alt="" />
            <img src="mariposa-alas-semicerradas.png" alt="" />
            <img src="mariposa-alas-cerradas.png" alt="" />
          </span>
          <span class="decor-butterfly decor-butterfly-right">
            <img src="mariposa-alas-abiertas.png" alt="" />
            <img src="mariposa-alas-semicerradas.png" alt="" />
            <img src="mariposa-alas-cerradas.png" alt="" />
          </span>
        </div>
        <p class="cover-date">Sábado 5 de septiembre</p>

        <a id="envelopeLink" class="envelope-link" href="invitacion.html" aria-label="Abrir invitación">
          <span class="tap-text">Presióname</span>
          <span class="envelope" aria-hidden="true">
            <span class="flap"></span>
            <span class="paper">
              <span>M</span>
            </span>
          </span>
        </a>
      </section>
    </main>

    <script src="inicio.js"></script>
    <script src="js/butterflies.js" data-butterfly-mode="png" data-butterfly-zone="lower"></script>
  </body>
</html>
